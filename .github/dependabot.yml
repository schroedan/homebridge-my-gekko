version: 2

updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'sunday'

  - package-ecosystem: 'npm'
    directory: '/'
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'
    schedule:
      interval: 'weekly'
      day: 'monday'
